version: '3.8'

services:
  koha_db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: Yb0Urv9n1f3y6wJt5M4LIES7jAo28eKq
      MYSQL_DATABASE: zeabur
    networks:
      - koha_network

  # Nombres exactos para que Koha los encuentre por defecto
  memcached:
    image: memcached:alpine
    networks:
      - koha_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    networks:
      - koha_network
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    # El plugin debe estar activo
    command: >
      bash -c "rabbitmq-plugins enable --offline rabbitmq_stomp rabbitmq_management && rabbitmq-server"

  koha_web:
    image: digibib/koha:latest
    # Forzamos la resolución de nombres para que Koha no falle
    extra_hosts:
      - "memcached:127.0.0.1"
      - "rabbitmq:127.0.0.1"
    environment:
      - KOHA_INSTANCE=digitalgmas
      - KOHA_DBHOST=koha_db
      - KOHA_DBNAME=zeabur
      - KOHA_DBUSER=root
      - KOHA_DBPASS=Yb0Urv9n1f3y6wJt5M4LIES7jAo28eKq
      # Variables forzadas
      - MEMCACHED_SERVERS=memcached:11211
      - RABBITMQ_HOST=rabbitmq
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - koha_db
      - memcached
      - rabbitmq
    networks:
      - koha_network

networks:
  koha_network:
    driver: bridge
