version: '3.8'

services:
  koha_db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: Yb0Urv9n1f3y6wJt5M4LIES7jAo28eKq
      MYSQL_DATABASE: zeabur
    networks:
      - koha_network

  koha_web:
    image: digibib/koha:latest
    environment:
      - KOHA_INSTANCE=digitalgmas
      - KOHA_DBHOST=koha_db
      - KOHA_DBNAME=zeabur
      - KOHA_DBUSER=root
      - KOHA_DBPASS=Yb0Urv9n1f3y6wJt5M4LIES7jAo28eKq
      # DESACTIVAR SERVICIOS PARA EVITAR EL ERROR 500
      - KOHA_USE_MEMCACHED=0
      - KOHA_USE_RABBITMQ=0
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - koha_db
    networks:
      - koha_network

networks:
  koha_network:
    driver: bridge
